name: FerAnimeNative
options:
  bundleIdPrefix: com.feranime
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  FerAnimeNative:
    type: application
    platform: iOS
    sources:
      - FerAnime
    info:
      path: FerAnime/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.feranime.native
        PRODUCT_NAME: FerAnimeNative
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: AVKit.framework
      - sdk: WebKit.framework
